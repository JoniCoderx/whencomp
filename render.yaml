# Render blueprint for When Comp — free plan, no paid services.
# Docs: https://render.com/docs/blueprint-spec
#
# This service builds from the included Dockerfile (Docker runtime).
#
# DATABASE: uses a free Neon (Postgres) database so data persists across
# deploys. Create a project at https://neon.tech, copy the connection string,
# and paste it into the DATABASE_URL env var in the Render dashboard.
# Use Neon's DIRECT (non-pooled) connection string so `prisma db push` works.

services:
  - type: web
    name: whencomp
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        # Paste your Neon DIRECT (non-pooled) connection string here, e.g.
        # postgresql://USER:PASSWORD@ep-xxx.us-east-1.aws.neon.tech/neondb?sslmode=require
        sync: false
      - key: NEXTAUTH_URL
        # Your live Render URL, e.g. https://whencomp.onrender.com
        # Auth callbacks break if it does not match exactly.
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
